<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Chat — Observability Demo</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c2330;
        --border: #2d333b;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #2f81f7;
        --user: #1f6feb;
        --tool: #8957e5;
        --guard: #d29922;
        --error: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(1100px 520px at 50% -8%, #122339, #07090d);
        color: var(--text);
        height: 100vh;
        padding: 24px;
      }
      .app {
        display: flex; flex-direction: column;
        width: 100%; max-width: 880px; height: 100%;
        margin: 0 auto;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      .topbar {
        display: flex; align-items: center; gap: 10px;
        padding: 16px 22px; border-bottom: 1px solid var(--border); background: var(--panel);
      }
      .brand { font-weight: 600; font-size: 16px; }
      .brand span { color: var(--muted); font-weight: 400; font-size: 12px; }

      .body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      .app.empty .body { justify-content: center; }

      .hero { text-align: center; padding: 0 24px 24px; }
      .hero h1 { font-size: 27px; font-weight: 600; margin: 0; }
      .hero p { color: var(--muted); margin: 10px 0 0; font-size: 14px; }
      .app:not(.empty) .hero { display: none; }

      #messages { flex: 1; overflow-y: auto; padding: 24px 22px; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
      .app.empty #messages { display: none; }
      .msg { display: flex; }
      .msg.user { justify-content: flex-end; }
      .bubble {
        max-width: 82%; padding: 14px 18px; border-radius: 16px; line-height: 1.55;
        white-space: pre-wrap; word-wrap: break-word; font-size: 16px;
      }
      .msg.user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
      .msg.assistant .bubble { background: var(--panel-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
      .notice {
        align-self: center; font-size: 12px; padding: 4px 10px; border-radius: 999px;
        border: 1px solid var(--border); color: var(--muted); background: var(--panel);
      }
      .notice.tool { color: #c8a6ff; border-color: var(--tool); }
      .notice.guard { color: #f2cc60; border-color: var(--guard); }
      .notice.error { color: #ff7b72; border-color: var(--error); }

      .composer-wrap { padding: 14px 22px 20px; }
      .app.empty .composer-wrap { padding-top: 0; }
      .composer {
        background: var(--panel-2); border: 1px solid var(--border);
        border-radius: 22px; padding: 10px 12px 8px;
        display: flex; flex-direction: column; gap: 6px;
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.28);
      }
      .composer:focus-within { border-color: var(--accent); }
      .composer textarea {
        width: 100%; resize: none; border: 0; outline: none; background: transparent;
        color: var(--text); font-size: 16px; line-height: 1.5; font-family: inherit;
        max-height: 200px; padding: 6px 8px 0;
      }
      .composer textarea::placeholder { color: var(--muted); }
      .composer-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 0 2px; }
      .composer-bar .model { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
      .composer select {
        background: var(--panel); color: var(--text); border: 1px solid var(--border);
        border-radius: 999px; padding: 6px 10px; font-size: 12px; cursor: pointer; outline: none;
      }
      .send {
        width: 36px; height: 36px; border-radius: 50%; border: 0; cursor: pointer;
        background: var(--accent); color: #fff; font-size: 17px; line-height: 1;
        display: flex; align-items: center; justify-content: center;
      }
      .send:disabled { opacity: 0.45; cursor: default; }
    </style>
  </head>
  <body>
    <div class="app empty" id="app">
      <div class="topbar">
        <div class="brand">🛰️ Agent Chat <span>· vendor-agnostic observability demo</span></div>
      </div>
      <div class="body">
        <div id="messages"></div>
        <div class="hero">
          <h1>Ready when you are.</h1>
          <p>Ask the agent anything — choose a model below.</p>
        </div>
        <div class="composer-wrap">
          <form class="composer" id="composer" autocomplete="off">
            <textarea id="input" rows="1" placeholder="Ask the agent…"></textarea>
            <div class="composer-bar">
              <label class="model">Model
                <select id="provider"></select>
              </label>
              <button class="send" id="send" type="submit" title="Send">↑</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const appEl = document.getElementById("app");
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("composer");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const providerSel = document.getElementById("provider");

      function autoGrow() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 200) + "px";
      }
      input.addEventListener("input", autoGrow);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
      });

      async function loadProviders() {
        try {
          const res = await fetch("/providers");
          const data = await res.json();
          for (const p of data.providers) {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = p.label;
            if (p.id === data.default) opt.selected = true;
            providerSel.appendChild(opt);
          }
        } catch (e) {
          console.error("could not load providers", e);
        }
      }

      function addMessage(role) {
        const wrap = document.createElement("div");
        wrap.className = "msg " + role;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      function addNotice(text, kind) {
        const n = document.createElement("div");
        n.className = "notice " + (kind || "");
        n.textContent = text;
        messagesEl.appendChild(n);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function send(text) {
        addMessage("user").textContent = text;
        const bubble = addMessage("assistant");
        let acc = "";

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, provider: providerSel.value }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buf.indexOf("\n\n")) >= 0) {
            const raw = buf.slice(0, idx).trim();
            buf = buf.slice(idx + 2);
            if (!raw.startsWith("data:")) continue;
            let evt;
            try { evt = JSON.parse(raw.slice(5).trim()); } catch { continue; }
            if (evt.type === "token") { acc += evt.text; bubble.textContent = acc; }
            else if (evt.type === "tool") addNotice("🔧 tool · " + evt.name, "tool");
            else if (evt.type === "guardrail") addNotice("🛡️ blocked (" + evt.stage + "): " + evt.reason, "guard");
            else if (evt.type === "redacted") { bubble.textContent = evt.text; addNotice("🛡️ output redacted by guardrail", "guard"); }
            else if (evt.type === "error") addNotice("⚠️ " + evt.message, "error");
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        appEl.classList.remove("empty");
        input.value = "";
        autoGrow();
        sendBtn.disabled = true;
        try { await send(text); }
        catch (err) { addNotice("⚠️ " + err.message, "error"); }
        finally { sendBtn.disabled = false; input.focus(); }
      });

      loadProviders();
      input.focus();
    </script>
  </body>
</html>
