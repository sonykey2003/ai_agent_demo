# Optional: expose the chat UI. Requires an ingress controller (e.g. nginx).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-chat
  namespace: agent-demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"  # keep SSE streaming live
spec:
  rules:
    - host: agent-chat.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
