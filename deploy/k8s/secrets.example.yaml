# Copy to secrets.yaml and fill in real values (secrets.yaml is git-ignored).
# Only the Collector needs the observability-backend secrets; the app only needs
# the model provider keys.
apiVersion: v1
kind: Secret
metadata:
  name: agent-demo-secrets
  namespace: agent-demo
type: Opaque
stringData:
  # ---- Model providers (used by the backend) ----
  OPENAI_API_KEY: ""
  NVIDIA_API_KEY: ""

  # ---- Observability backend (used by the Collector only) ----
  GALILEO_API_KEY: ""
  GALILEO_PROJECT: "agent-chat-demo"
  GALILEO_LOG_STREAM: "default"
  # OTLP ingest URL: console host with `console`->`api`, then /otel/traces.
  GALILEO_OTEL_ENDPOINT: "https://api.galileo.ai/otel/traces"
