# OpenTelemetry Collector: the single place that routes telemetry to a backend.
# Edit the ConfigMap's exporters + traces pipeline to switch observability vendors.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: agent-demo
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch: {}
    exporters:
      otlp_http/galileo:
        traces_endpoint: ${env:GALILEO_OTEL_ENDPOINT}
        headers:
          Galileo-API-Key: ${env:GALILEO_API_KEY}
          project: ${env:GALILEO_PROJECT}
          logstream: ${env:GALILEO_LOG_STREAM}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp_http/galileo]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: agent-demo
  labels: { app: otel-collector }
spec:
  replicas: 1
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otelcol/config.yaml"]
          envFrom:
            - secretRef:
                name: agent-demo-secrets
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: agent-demo
spec:
  selector: { app: otel-collector }
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
