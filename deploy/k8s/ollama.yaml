apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: agent-demo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: agent-demo
  labels: { app: ollama }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          lifecycle:
            postStart:
              exec:
                # Pull the tiny model once the server is up (CPU-friendly).
                command:
                  - /bin/sh
                  - -c
                  - "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull qwen2.5:0.5b"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agent-demo
spec:
  selector: { app: ollama }
  ports:
    - port: 11434
      targetPort: 11434
